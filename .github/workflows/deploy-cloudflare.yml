name: Deploy to Cloudflare Pages

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: cloudflare-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.2.6"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - run: bun install

      - name: Build for Cloudflare
        run: bun run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          LOVABLE_API_KEY: ${{ secrets.LOVABLE_API_KEY }}

      - name: Inspect build output
        run: find . -type f -not -path './node_modules/*' -not -path './.git/*' -not -path './src/*' -not -name '*.ts' -not -name '*.json' -not -name '*.lock' -not -name '*.yml' | head -50

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/client --project-name=tanstack-start-app
